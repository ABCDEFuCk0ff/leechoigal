<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 - 이승호최은성 갤러리</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1>이승호최은성 갤러리</h1>
            <span class="sub-text">연관 갤러리(0)</span>
        </div>
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn">공부 보고</a>
            <a href="index.html#free" class="nav-btn active">자유 게시판</a>
        </div>
    </header>

    <div class="container">
        <form class="write-page-form" id="writeForm">
            <div class="form-group">
                <input type="text" id="title" name="title" placeholder="제목을 입력해 주세요." required>
            </div>
            <div class="form-group" style="font-size: 14px;">
                <label style="display: inline-block; margin-right: 15px; cursor: pointer;">
                    <input type="radio" name="author" value="이승호" checked> 이승호
                </label>
                <label style="display: inline-block; cursor: pointer;">
                    <input type="radio" name="author" value="최은성"> 최은성
                </label>
            </div>
            <div class="form-group">
                <textarea id="content" name="content" placeholder="내용을 입력해 주세요."></textarea>
            </div>
            <div class="bottom-menu">
                <button type="submit" class="btn btn-submit">등록</button>
                <a href="index.html" class="btn btn-cancel">취소</a>
            </div>
        </form>
    </div>

    <script src="js/write.js"></script>
</body>
</html>
